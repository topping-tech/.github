name: Update org profile table (reusable)

on:
  workflow_call:

permissions:
  contents: write

jobs:
  update-table:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout org profile repo
        uses: actions/checkout@v4
        with:
          repository: topping-tech/.github
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate repository table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: topping-tech
        run: node scripts/update-repo-table.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet profile/README.md scripts/pinned-repos.json; then
            echo "No changes."
            exit 0
          fi
          git add profile/README.md scripts/pinned-repos.json
          git commit -m "chore: auto-update org repository table"
          git push
