name: Update org profile repo table

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [update-repo-table]
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes — catches new repos automatically

permissions:
  contents: write

jobs:
  update-table:
    uses: ./.github/workflows/update-org-readme-reusable.yml
